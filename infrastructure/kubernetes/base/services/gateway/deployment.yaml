apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: xp-panel
  labels:
    app: gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/xp-panel/xp-panel/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: http://auth:8081
            - name: DNS_SERVICE_URL
              value: http://dns:8082
            - name: MAIL_SERVICE_URL
              value: http://mail:8083
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
