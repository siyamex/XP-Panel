apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops
  namespace: xp-panel
  labels:
    app: devops
    app.kubernetes.io/component: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: devops
          image: ghcr.io/xp-panel/xp-panel/devops:latest
          ports:
            - containerPort: 8093
              name: http
          env:
            - name: PORT
              value: "8093"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: redis-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 5
            periodSeconds: 10
