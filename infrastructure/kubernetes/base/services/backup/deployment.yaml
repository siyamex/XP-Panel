apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup
  namespace: xp-panel
  labels:
    app: backup
    app.kubernetes.io/component: backup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backup
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backup
          image: ghcr.io/xp-panel/xp-panel/backup:latest
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: PORT
              value: "8087"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: redis-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 10
