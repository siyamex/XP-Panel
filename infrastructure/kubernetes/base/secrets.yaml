apiVersion: v1
kind: Secret
metadata:
  name: xp-panel-secrets
  namespace: xp-panel
  labels:
    app.kubernetes.io/name: xp-panel
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # In production, use External Secrets Operator or Vault Agent Injector
    # This file contains placeholder values — never commit real secrets
    kubernetes.io/description: "XP-Panel application secrets — populate via CI/CD or ESO"
type: Opaque
stringData:
  database-url: "REPLACE_WITH_DATABASE_URL"
  redis-url: "REPLACE_WITH_REDIS_URL"
  jwt-secret: "REPLACE_WITH_JWT_SECRET"
  vault-token: "REPLACE_WITH_VAULT_TOKEN"
  stripe-secret-key: "REPLACE_WITH_STRIPE_SECRET_KEY"
  stripe-webhook-secret: "REPLACE_WITH_STRIPE_WEBHOOK_SECRET"
  anthropic-api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"
  minio-access-key: "REPLACE_WITH_MINIO_ACCESS_KEY"
  minio-secret-key: "REPLACE_WITH_MINIO_SECRET_KEY"
  powerdns-api-key: "REPLACE_WITH_POWERDNS_API_KEY"
  smtp-password: "REPLACE_WITH_SMTP_PASSWORD"
