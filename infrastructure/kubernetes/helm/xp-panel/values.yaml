# XP-Panel Helm Chart Values
# See https://github.com/xp-panel/xp-panel for full documentation

global:
  imageRegistry: ghcr.io
  imagePullPolicy: IfNotPresent
  storageClass: ""

# Image configuration
image:
  repository: xp-panel/xp-panel
  tag: latest
  pullPolicy: IfNotPresent

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  hosts:
    api: api.xp-panel.io
    web: xp-panel.io
  tls:
    enabled: true
    secretName: xp-panel-tls
    # Set to true to use cert-manager
    certManager: true
    clusterIssuer: letsencrypt-prod

# Gateway service
gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Auth service
auth:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    jwtExpiry: 15m
    refreshTokenExpiry: 168h
    mfaEnabled: true
    passkeysEnabled: true

# Web frontend
web:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# Secrets — populate these via --set or external secrets
secrets:
  databaseUrl: ""
  redisUrl: ""
  jwtSecret: ""
  vaultToken: ""
  stripeSecretKey: ""
  anthropicApiKey: ""

# Services map — used by templates/services.yaml to generate
# Deployment + Service + HPA for each backend microservice.
services:
  gateway:
    port: 8080
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
