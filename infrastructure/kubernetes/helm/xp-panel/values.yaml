# PostgreSQL (bitnami chart)
postgresql:
  enabled: true
  auth:
    database: xppanel
    username: xppanel
    existingSecret: xp-panel-db-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 2Gi

# Redis (bitnami chart)
redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: xp-panel-redis-secret
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 5Gi
  replica:
    replicaCount: 1

# cert-manager ClusterIssuer (created if certManager.install=true)
certManager:
  install: false
  email: admin@xp-panel.io
  server: https://acme-v02.api.letsencrypt.org/directory

# Monitoring
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
