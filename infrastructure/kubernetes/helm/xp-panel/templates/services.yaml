{{/*
  services.yaml
  Generates a Deployment, Service, and HPA for every entry in .Values.services.
  Each key in the map becomes the service name; the value supplies port, replicas,
  autoscaling, and resources.
*/}}
{{- range $name, $svc := .Values.services }}
---
# ──────────────────────────────────────────────────────────────
# Deployment: {{ $name }}
# ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xp-panel.name" $ }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "xp-panel.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "xp-panel.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "xp-panel.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") $ | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $.Values.image.repository }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: SERVICE_PORT
              value: {{ $svc.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: databaseUrl
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: redisUrl
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: xp-panel-secrets
                  key: jwtSecret
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: {{ $name }}
                topologyKey: kubernetes.io/hostname
---
# ──────────────────────────────────────────────────────────────
# Service: {{ $name }}
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xp-panel.name" $ }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "xp-panel.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "xp-panel.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
---
# ──────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler: {{ $name }}
# ──────────────────────────────────────────────────────────────
{{- if $svc.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "xp-panel.name" $ }}-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "xp-panel.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "xp-panel.name" $ }}-{{ $name }}
  minReplicas: {{ $svc.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
{{- end }}
{{- end }}
